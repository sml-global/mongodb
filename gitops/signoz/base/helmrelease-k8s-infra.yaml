apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: signoz-k8s-infra
  namespace: signoz
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-infra
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: signoz
  values:
    global:
      cloud: aws
      clusterName: EKS-boomi-runtime-cluster
      deploymentEnvironment: dev
    otelCollectorEndpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318
    otelInsecure: true
    presets:
      otlphttpExporter:
        enabled: true
      loggingExporter:
        enabled: false
      resourceDetection:
        detectors:
          - eks
          - system
