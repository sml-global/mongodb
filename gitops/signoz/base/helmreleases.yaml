apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: signoz
  namespace: signoz
spec:
  interval: 30m
  chart:
    spec:
      chart: signoz
      version: 0.130.1
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: signoz
  values:
    global:
      storageClass: gp3-mongodb
    clickhouse:
      password: "CHANGE_ME_BEFORE_PRODUCTION"
  install:
    createNamespace: true
