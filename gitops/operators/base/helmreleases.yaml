apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: percona-server-mongodb-operator
  namespace: mongodb
spec:
  interval: 30m
  chart:
    spec:
      chart: psmdb-operator
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: percona
        namespace: mongodb
  values:
    watchNamespace: mongodb
