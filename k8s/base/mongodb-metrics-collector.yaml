# Collects MongoDB replica-set metrics (connections, ops, locks, cache, memory,
# replication) via the OpenTelemetry Collector's native `mongodb` receiver and
# forwards them as OTLP to the SigNoz otel-collector, so MongoDB shows up as a
# monitored service alongside audit-log traces/logs in the same SigNoz instance.
#
# Uses the existing `MONGODB_CLUSTER_MONITOR_USER`/`MONGODB_CLUSTER_MONITOR_PASSWORD`
# credentials that the Percona Operator already provisions in `psmdb-secrets`
# (clusterMonitor role — read-only, metrics-only permissions). No new secrets,
# IAM roles, or AWS permissions are required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-metrics-collector-config
data:
  config.yaml: |
    receivers:
      mongodb:
        hosts:
          - endpoint: psmdb-rs0-0.psmdb-rs0.mongodb.svc.cluster.local:27017
          - endpoint: psmdb-rs0-1.psmdb-rs0.mongodb.svc.cluster.local:27017
          - endpoint: psmdb-rs0-2.psmdb-rs0.mongodb.svc.cluster.local:27017
        username: ${env:MONGODB_CLUSTER_MONITOR_USER}
        password: ${env:MONGODB_CLUSTER_MONITOR_PASSWORD}
        collection_interval: 60s
        tls:
          insecure: false
          insecure_skip_verify: true
          ca_file: /etc/mongodb-tls/ca.crt
          cert_file: /etc/mongodb-tls/tls.crt
          key_file: /etc/mongodb-tls/tls.key
      # Self-telemetry: scrape this collector's own internal Prometheus metrics
      # endpoint (otelcol_* series) and forward them too, so the "OpenTelemetry
      # Collector Pipeline Health" dashboard has data for this collector instance.
      prometheus/self:
        config:
          scrape_configs:
            - job_name: 'otelcol-self'
              scrape_interval: 60s
              static_configs:
                - targets: ['127.0.0.1:8888']

    processors:
      batch: {}
      resourcedetection/system:
        detectors: ["system"]
        system:
          hostname_sources: ["os"]
      resource:
        attributes:
          - key: service.name
            value: "mongodb-rs0"
            action: upsert
      resource/self:
        attributes:
          - key: service.name
            value: "mongodb-metrics-collector"
            action: upsert

    exporters:
      otlp:
        endpoint: signoz-otel-collector.signoz.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [mongodb]
          processors: [resourcedetection/system, resource, batch]
          exporters: [otlp]
        metrics/self:
          receivers: [prometheus/self]
          processors: [resource/self, batch]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-metrics-collector
  labels:
    app.kubernetes.io/name: mongodb-metrics-collector
    app.kubernetes.io/part-of: mongodb-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb-metrics-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-metrics-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.155.0
          args: ["--config=/etc/otel/config.yaml"]
          envFrom:
            - secretRef:
                name: psmdb-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
            - name: mongodb-tls
              mountPath: /etc/mongodb-tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mongodb-metrics-collector-config
        - name: mongodb-tls
          secret:
            secretName: psmdb-ssl-internal
