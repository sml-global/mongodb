apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-selfsigned
  namespace: mongodb
spec:
  selfSigned: {}
---
# CA certificate issued by the self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mongodb-ca
  namespace: mongodb
spec:
  isCA: true
  secretName: mongodb-ca-keypair
  duration: 87600h   # 10 years
  renewBefore: 8760h # 1 year
  commonName: mongodb-ca
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    kind: Issuer
    name: mongodb-selfsigned
---
# CA issuer that signs all MongoDB TLS certs from the shared CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-ca-issuer
  namespace: mongodb
spec:
  ca:
    secretName: mongodb-ca-keypair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mongodb-app-client
  namespace: mongodb
spec:
  secretName: mongodb-app-client-cert
  duration: 720h
  renewBefore: 120h
  commonName: app-client
  usages:
    - client auth
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    kind: Issuer
    name: mongodb-selfsigned
