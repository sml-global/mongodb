apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: psmdb
  namespace: mongodb
spec:
  replsets:
    - name: rs0
      serviceAccountName: psmdb-db
      size: 3
      affinity:
        antiAffinityTopologyKey: "none"
      resources:
        requests:
          cpu: "250m"
          memory: 1Gi
        limits:
          cpu: "250m"
          memory: 1Gi
      configuration: |
        storage:
          wiredTiger:
            engineConfig:
              cacheSizeGB: 0.5
      volumeSpec:
        persistentVolumeClaim:
          storageClassName: gp3-mongodb
          resources:
            requests:
              storage: 20Gi
  backup:
    enabled: false
    pitr:
      enabled: false
    storages:
      s3-main:
        type: s3
        s3:
          bucket: sml-aw-gb0-d-oms-gen-s3-01
          region: ap-east-1
