apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-app-mongodb-password-secrets
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-mongodb-password-externalsecret-outside-mongodb-ns
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      preconditions:
        all:
          - key: "{{ request.object.metadata.namespace || '' }}"
            operator: NotEquals
            value: mongodb
      validate:
        message: "MongoDB auth material via ExternalSecret is only allowed in mongodb namespace bootstrap scope."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.target.name || '' }}"
                operator: AnyIn
                value:
                  - mongodb-app-password
                  - mongodb-app-user
                  - mongo-password
                  - mongo-user
